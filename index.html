<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Doxibero World</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; }
  #hud {
    position: fixed; bottom: 14px; left: 14px;
    color: rgba(230,235,245,.85); font: 12px/1.6 'Courier New', monospace;
    background: linear-gradient(135deg, rgba(10,18,40,.5), rgba(6,12,28,.4));
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(100,150,255,.12);
    padding: 10px 16px; border-radius: 10px;
    pointer-events: none; white-space: pre;
    box-shadow: 0 4px 30px rgba(0,0,0,.3);
  }
  #hud .l { color: #6a8ccc; }
  #debug {
    position: fixed; top: 14px; right: 14px;
    color: #8aa0c0; font: 11px/1.5 'Courier New', monospace;
    background: linear-gradient(135deg, rgba(10,15,30,.45), rgba(5,10,25,.35));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(100,140,220,.1);
    padding: 8px 14px; border-radius: 8px;
    pointer-events: none; white-space: pre;
    box-shadow: 0 2px 20px rgba(0,0,0,.25);
  }
</style>
</head>
<body>
<div id="hud"></div>
<div id="debug"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>

/* ============================================================
   WORLD CONSTANTS — every rule of this universe
   ============================================================ */
var WORLD = {
  GRAVITY: 9.81, AIR_DENSITY: 1.225, DRAG_COEFF: 0.47,
  WIND: { x: 0.6, y: 0, z: 0.35 },
  GROUND_FRICTION: 0.6, GROUND_BOUNCE: 0.3,
  SIZE: 400, BOUNDARY: 'soft',
  MAX_DT: 0.05, SUBSTEPS: 2,
  RESTITUTION: 0.4, MIN_VELOCITY: 0.01,
  ISLAND_R: 65, SEAFLOOR_Y: -14,
  SUN_DIR: new THREE.Vector3(0.55, 0.42, -0.72).normalize()
};

/* ============================================================
   VECTOR MATH
   ============================================================ */
var VMath = {
  clamp: function(v,a,b){return Math.max(a,Math.min(b,v));},
  lerp: function(a,b,t){return a+(b-a)*t;},
  len: function(v){return Math.sqrt(v.x*v.x+v.y*v.y+v.z*v.z);},
  sub: function(a,b){return{x:a.x-b.x,y:a.y-b.y,z:a.z-b.z};},
  scale: function(v,s){return{x:v.x*s,y:v.y*s,z:v.z*s};},
  normalize: function(v){var l=VMath.len(v);if(l<.0001)return{x:0,y:0,z:0};return{x:v.x/l,y:v.y/l,z:v.z/l};},
  dot: function(a,b){return a.x*b.x+a.y*b.y+a.z*b.z;}
};

/* ============================================================
   PHYSICS ENGINE (ready for future entities)
   ============================================================ */
var entities = [];
var Physics = {
  step: function(e, dt) {
    e.vel.y -= WORLD.GRAVITY * dt;
    var speed = VMath.len(e.vel);
    if (speed > WORLD.MIN_VELOCITY) {
      var area = Math.PI * e.radius * e.radius;
      var dragDt = Math.min((0.5*WORLD.AIR_DENSITY*speed*speed*e.dragCoeff*area/e.mass)*dt, speed);
      var d = VMath.normalize(e.vel);
      e.vel.x -= d.x*dragDt; e.vel.y -= d.y*dragDt; e.vel.z -= d.z*dragDt;
    }
    e.pos.x += e.vel.x*dt; e.pos.y += e.vel.y*dt; e.pos.z += e.vel.z*dt;
    e.grounded = false;
    var groundH = heightAt(e.pos.x, e.pos.z) + e.radius;
    if (e.pos.y <= groundH) {
      e.pos.y = groundH;
      if (e.vel.y < -0.5) e.vel.y *= -e.bounce; else e.vel.y = 0;
      var f = VMath.clamp(1 - e.friction*dt*10, 0, 1);
      e.vel.x *= f; e.vel.z *= f;
      e.grounded = true;
    }
    if (Math.abs(e.vel.x) < WORLD.MIN_VELOCITY) e.vel.x = 0;
    if (Math.abs(e.vel.y) < WORLD.MIN_VELOCITY) e.vel.y = 0;
    if (Math.abs(e.vel.z) < WORLD.MIN_VELOCITY) e.vel.z = 0;
  },
  collide: function(a,b) {
    var diff = VMath.sub(b.pos,a.pos), dist = VMath.len(diff), min = a.radius+b.radius;
    if (dist < min && dist > .001) {
      var n = VMath.scale(diff,1/dist), ov = min-dist, tm = a.mass+b.mass;
      a.pos.x-=n.x*ov*(b.mass/tm); a.pos.y-=n.y*ov*(b.mass/tm); a.pos.z-=n.z*ov*(b.mass/tm);
      b.pos.x+=n.x*ov*(a.mass/tm); b.pos.y+=n.y*ov*(a.mass/tm); b.pos.z+=n.z*ov*(a.mass/tm);
      var rv=VMath.sub(a.vel,b.vel), vn=VMath.dot(rv,n);
      if(vn>0)return false;
      var imp=-(1+Math.min(a.bounce,b.bounce))*vn/tm;
      a.vel.x+=imp*b.mass*n.x; a.vel.y+=imp*b.mass*n.y; a.vel.z+=imp*b.mass*n.z;
      b.vel.x-=imp*a.mass*n.x; b.vel.y-=imp*a.mass*n.y; b.vel.z-=imp*a.mass*n.z;
      return true;
    }
    return false;
  }
};

function createEntity(o) {
  var e = {
    pos:o.pos||{x:0,y:5,z:0}, vel:o.vel||{x:0,y:0,z:0},
    mass:o.mass||1, radius:o.radius||0.5,
    friction:o.friction||WORLD.GROUND_FRICTION, bounce:o.bounce||WORLD.GROUND_BOUNCE,
    dragCoeff:o.dragCoeff||WORLD.DRAG_COEFF, grounded:false, heading:o.heading||0,
    type:o.type||'generic', mesh:o.mesh||null,
    dynamic:o.dynamic!==undefined?o.dynamic:true, data:o.data||{}
  };
  entities.push(e); return e;
}

/* ============================================================
   RENDERER
   ============================================================ */
var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.body.appendChild(renderer.domElement);

var scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xa7c8de, 0.0021);
var camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 2000);

/* ============================================================
   NOISE — proper value noise + fbm for terrain
   ============================================================ */
function hash(x, y) {
  var s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
  return s - Math.floor(s);
}
function vnoise(x, y) {
  var xi = Math.floor(x), yi = Math.floor(y);
  var xf = x - xi, yf = y - yi;
  var u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
  return hash(xi,yi)*(1-u)*(1-v) + hash(xi+1,yi)*u*(1-v) +
         hash(xi,yi+1)*(1-u)*v + hash(xi+1,yi+1)*u*v;
}
function fbm(x, y, octaves) {
  octaves = octaves || 5;
  var t = 0, a = 1, f = 1, m = 0;
  for (var i = 0; i < octaves; i++) {
    t += a * vnoise(x*f, y*f); m += a; a *= 0.5; f *= 2.03;
  }
  return t / m;
}

/* ============================================================
   TERRAIN — organic coastline, layered noise, proper coloring
   ============================================================ */
var IR = WORLD.ISLAND_R;

// Irregular coastline — varies radius by angle
function coastR(ang) {
  return IR * (1 + 0.14*Math.sin(ang*3+1.7) + 0.08*Math.sin(ang*7+0.3)
             + 0.05*Math.sin(ang*13-2.1) + 0.10*Math.max(0,Math.sin(ang)));
}

function heightAt(x, z) {
  var d = Math.sqrt(x*x + z*z);
  var ang = Math.atan2(z, x);
  var rMod = coastR(ang);

  // underwater beyond coast
  if (d > rMod) return Math.max(-2.0 - (d-rMod)*0.35, WORLD.SEAFLOOR_Y + 0.3);

  // island shape: smooth falloff from center
  var t = 1 - d / rMod;
  t = t * t * (3 - 2 * t); // smoothstep

  var h = t * 7.0;
  h += fbm(x*0.030+7, z*0.030+3, 4) * 6.5 * t * t;  // large hills
  h += fbm(x*0.085+20, z*0.085+20, 5) * 2.4 * t;     // medium detail
  h += fbm(x*0.30+5, z*0.30+9, 4) * 0.6 * t;         // small bumps
  h += fbm(x*0.9+31, z*0.9+17, 3) * 0.18 * t;        // micro detail

  return h - 2.0; // shift so beaches sit near y=0
}

function slopeAt(x, z) {
  var e = 1.2;
  var hx = heightAt(x+e,z) - heightAt(x-e,z);
  var hz = heightAt(x,z+e) - heightAt(x,z-e);
  return Math.sqrt(hx*hx + hz*hz) / (2*e);
}

// Build terrain mesh with vertex colors
var TRES = 340;
var terrainGeo = new THREE.PlaneGeometry(300, 300, TRES, TRES);
terrainGeo.rotateX(-Math.PI / 2);
var tp = terrainGeo.attributes.position;
var tColors = [];

var cWet    = new THREE.Color(0xbfa87c);
var cSand   = new THREE.Color(0xeee3ba);
var cGrass  = new THREE.Color(0x6d9a4e);
var cMeadow = new THREE.Color(0x8fae56);
var cForest = new THREE.Color(0x3e6b34);
var cFloor  = new THREE.Color(0x173f4d);
var tmpC    = new THREE.Color();

for (var i = 0; i < tp.count; i++) {
  var x = tp.getX(i), z = tp.getZ(i);
  var h = heightAt(x, z);
  tp.setY(i, h);

  var n  = fbm(x*0.35, z*0.35, 3);
  var n2 = fbm(x*0.06+11, z*0.06+4, 3);

  if (h < -0.6) {
    tmpC.copy(cWet).lerp(cSand, 0.3);
    tmpC.lerp(cFloor, VMath.clamp((-h-1.5)/7.0, 0, 1));
  } else if (h < 0.5) {
    tmpC.copy(cWet);
  } else if (h < 2.2) {
    tmpC.copy(cSand).lerp(cWet, VMath.clamp((1.2-h)/0.8, 0, 1));
  } else {
    var g = VMath.clamp((h-2.2)/1.2, 0, 1);
    tmpC.copy(cGrass).lerp(cMeadow, VMath.clamp(n2*1.4-0.3, 0, 1));
    tmpC.lerp(cForest, VMath.clamp((n2-0.35)*2.0, 0, 1)*0.7);
    tmpC.lerp(cSand, 1-g);
  }
  tmpC.offsetHSL(0, 0, (n-0.5)*0.09);
  tColors.push(tmpC.r, tmpC.g, tmpC.b);
}

terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(tColors, 3));
terrainGeo.computeVertexNormals();

var island = new THREE.Mesh(terrainGeo,
  new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.95 }));
island.castShadow = island.receiveShadow = true;
scene.add(island);

// Seafloor
var seafloor = new THREE.Mesh(
  new THREE.PlaneGeometry(2000, 2000),
  new THREE.MeshStandardMaterial({ color: 0x173f4d, roughness: 1 }));
seafloor.rotation.x = -Math.PI/2;
seafloor.position.y = WORLD.SEAFLOOR_Y;
scene.add(seafloor);

/* ============================================================
   SKY SHADER
   ============================================================ */
var sky = new THREE.Mesh(
  new THREE.SphereGeometry(900, 32, 32),
  new THREE.ShaderMaterial({
    side: THREE.BackSide, fog: false, depthWrite: false,
    uniforms: { sunDir: { value: WORLD.SUN_DIR }, uTime: { value: 0 } },
    vertexShader: [
      'varying vec3 vDir;',
      'void main(){ vDir = normalize(position);',
      '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }'
    ].join('\n'),
    fragmentShader: [
      'varying vec3 vDir; uniform vec3 sunDir; uniform float uTime;',
      'float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}',
      'float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);',
      '  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}',
      'float fbm(vec2 p){float v=0.,a=.5;mat2 r=mat2(.8,.6,-.6,.8);',
      '  for(int i=0;i<5;i++){v+=a*noise(p);p=r*p*2.0;a*=.5;}return v;}',
      'void main(){',
      '  float h = clamp(vDir.y, 0.0, 1.0);',
      '  vec3 col = mix(vec3(0.78,0.87,0.94), vec3(0.22,0.47,0.78), pow(h, 0.65));',
      '  float s = max(dot(vDir, sunDir), 0.0);',
      '  col += vec3(1.0,0.9,0.7) * pow(s, 350.0) * 6.0;',   // sun disk
      '  col += vec3(1.0,0.85,0.6) * pow(s, 12.0) * 0.35;',   // halo
      '  col += vec3(1.0,0.95,0.85) * pow(s, 3.0) * 0.12;',   // atmospheric glow
      '  col = mix(col, vec3(0.93,0.90,0.82), pow(1.0-h, 8.0)*0.5);', // horizon haze
      '  if(h > 0.02){',
      '    vec2 cuv = vDir.xz/(h+0.08)*2.5 + uTime*0.015;',
      '    float cloud = smoothstep(0.4,0.7,fbm(cuv));',
      '    col = mix(col, vec3(1.0,0.99,0.96), cloud*0.7*smoothstep(0.0,0.15,h));',
      '  }',
      '  gl_FragColor = vec4(col, 1.0);',
      '}'
    ].join('\n')
  })
);
scene.add(sky);

/* ============================================================
   LIGHTING — matched to sun direction
   ============================================================ */
var sun = new THREE.DirectionalLight(0xfff2d9, 2.0);
sun.position.copy(WORLD.SUN_DIR).multiplyScalar(260);
sun.castShadow = true;
sun.shadow.mapSize.set(4096, 4096);
sun.shadow.camera.left = -100; sun.shadow.camera.right = 100;
sun.shadow.camera.top = 100; sun.shadow.camera.bottom = -100;
sun.shadow.bias = -0.0004;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xcfe6f7, 0x3d5a45, 0.6));

/* ============================================================
   OCEAN SHADER — waves, surf, foam, fresnel, sparkle
   ============================================================ */
var waterU = {
  time: { value: 0 }, sunDir: { value: WORLD.SUN_DIR },
  camPos: { value: camera.position },
  deep: { value: new THREE.Color(0x06405e) },
  shallow: { value: new THREE.Color(0x2fb3ae) },
  skyCol: { value: new THREE.Color(0xa9cfe8) },
  islandR: { value: IR }
};

var waterMat = new THREE.ShaderMaterial({
  uniforms: waterU, transparent: true, fog: false,
  vertexShader: [
    'uniform float time; uniform float islandR;',
    'varying vec3 vWorld; varying vec3 vNormal;',
    'float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}',
    'float noise(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.0-2.0*f);',
    '  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);}',
    'float fbm(vec2 p){float t=0.,a=.5;for(int i=0;i<3;i++){t+=a*noise(p);p*=2.1;a*=.5;}return t;}',
    'float wave(vec2 p,vec2 dir,float freq,float speed,float amp){',
    '  return sin(dot(p,dir)*freq+time*speed)*amp;}',
    'float waveH(vec2 p){',
    '  float d=length(p);',
    '  float e=mix(0.4,1.0,smoothstep(islandR-4.0,islandR+24.0,d));',
    '  float h=0.0;',
    '  h+=wave(p,vec2(0,1),0.05,0.7,0.55);',
    '  h+=wave(p,normalize(vec2(0.6,1)),0.11,1.0,0.30);',
    '  h+=wave(p,normalize(vec2(-0.5,0.8)),0.18,1.4,0.16);',
    '  h+=wave(p,normalize(vec2(1,0.2)),0.40,2.2,0.06);',
    '  h*=e;',
    '  float surf=smoothstep(islandR+16.0,islandR+2.0,d)*smoothstep(islandR-9.0,islandR-2.0,d);',
    '  float warp=fbm(p*0.05)*6.283;',
    '  float m1=smoothstep(0.35,0.75,fbm(p*0.045+13.0+time*0.05));',
    '  float m2=smoothstep(0.30,0.70,fbm(p*0.09+47.0-time*0.04));',
    '  float w1=sin(d*0.42+time*1.4+warp)*0.30*m1;',
    '  float w2=sin(d*0.75+time*2.2+warp*1.7+2.0)*0.15*m2;',
    '  float w3=sin(d*1.10+time*2.9+fbm(p*0.13)*7.0)*0.07;',
    '  h+=(w1+w2+w3)*surf;',
    '  return h;}',
    'void main(){',
    '  vec3 p=position; p.y+=waveH(p.xz);',
    '  float e=0.9;',
    '  float hx=waveH(p.xz+vec2(e,0))-waveH(p.xz-vec2(e,0));',
    '  float hz=waveH(p.xz+vec2(0,e))-waveH(p.xz-vec2(0,e));',
    '  vNormal=normalize(vec3(-hx/(2.0*e),1.0,-hz/(2.0*e)));',
    '  vec4 wp=modelMatrix*vec4(p,1.0); vWorld=wp.xyz;',
    '  gl_Position=projectionMatrix*viewMatrix*wp;}'
  ].join('\n'),
  fragmentShader: [
    'uniform float time;uniform vec3 sunDir,camPos,deep,shallow,skyCol;uniform float islandR;',
    'varying vec3 vWorld;varying vec3 vNormal;',
    'float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}',
    'float noise(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.0-2.0*f);',
    '  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);}',
    'float fbm(vec2 p){float t=0.,a=.5;for(int i=0;i<4;i++){t+=a*noise(p);p*=2.1;a*=.5;}return t;}',
    'void main(){',
    '  vec3 N=normalize(vNormal);',
    '  float r1=fbm(vWorld.xz*0.6+time*0.35);',
    '  float r2=fbm(vWorld.xz*0.6-time*0.28+40.0);',
    '  N=normalize(N+vec3(r1-0.5,0,r2-0.5)*0.3);',
    '  vec3 V=normalize(camPos-vWorld);',
    '  float fres=pow(1.0-max(dot(V,N),0.0),3.0);',
    '  float d=length(vWorld.xz);',
    '  float shallowMix=smoothstep(islandR+26.0,islandR-6.0,d);',
    '  vec3 col=mix(deep,shallow,shallowMix);',
    '  col=mix(col,skyCol,fres*0.75);',
    '  vec3 R=reflect(-sunDir,N);',
    '  float spec=pow(max(dot(R,V),0.0),300.0);',
    '  float sparkle=smoothstep(0.45,0.75,fbm(vWorld.xz*1.3+time*0.6));',
    '  col+=vec3(1,.95,.8)*spec*2.0*sparkle;',
    '  float shoreBand=smoothstep(islandR+7.0,islandR+1.5,d)*smoothstep(islandR-9.0,islandR-2.0,d);',
    '  float foamN=fbm(vWorld.xz*0.9+time*0.45)*fbm(vWorld.xz*1.7-time*0.35);',
    '  float lapFoam=shoreBand*smoothstep(0.20,0.44,foamN+0.12*sin(time*1.1+d*0.45));',
    '  float warp=fbm(vWorld.xz*0.05)*6.283;',
    '  float m1=smoothstep(0.35,0.75,fbm(vWorld.xz*0.045+13.0+time*0.05));',
    '  float m2=smoothstep(0.30,0.70,fbm(vWorld.xz*0.09+47.0-time*0.04));',
    '  float swashBand=smoothstep(islandR+14.0,islandR+0.5,d)*smoothstep(islandR-10.0,islandR-3.0,d);',
    '  float c1=smoothstep(0.62,0.95,0.5+0.5*sin(d*0.42+time*1.4+warp))*m1;',
    '  float c2=smoothstep(0.65,0.95,0.5+0.5*sin(d*0.75+time*2.2+warp*1.7+2.0))*m2*0.8;',
    '  float c3=smoothstep(0.70,0.95,0.5+0.5*sin(d*1.10+time*2.9+fbm(vWorld.xz*0.13)*7.0))*0.5;',
    '  float rollFoam=swashBand*(c1+c2+c3)*(0.35+0.75*fbm(vWorld.xz*1.6+time*0.5));',
    '  float foam=clamp(lapFoam+rollFoam,0.0,1.0);',
    '  col=mix(col,vec3(0.96,0.98,1.0),foam*0.8);',
    '  float dist=length(camPos-vWorld);',
    '  col=mix(col,vec3(0.66,0.78,0.87),smoothstep(150.0,650.0,dist));',
    '  float alpha=mix(0.95,0.62,shallowMix)+foam*0.3;',
    '  gl_FragColor=vec4(col,clamp(alpha,0.0,1.0));}'
  ].join('\n')
});

var water = new THREE.Mesh(
  new THREE.PlaneGeometry(1600, 1600, 256, 256).rotateX(-Math.PI/2),
  waterMat);
scene.add(water);

/* ============================================================
   BEACH SWASH — run-up, backwash, soak-in
   ============================================================ */
var swashU = { time: { value: 0 } };

(function buildSwash() {
  var SEGA = 240, SEGR = 18;
  var pos = [], aH = [], aPh = [], aAm = [], idx = [];

  for (var ia = 0; ia <= SEGA; ia++) {
    var ang = ia / SEGA * Math.PI * 2;
    var rOut = coastR(ang) + 12, rIn = coastR(ang) * 0.4, foundOut = false;

    for (var r = coastR(ang) + 12; r > 5; r -= 0.3) {
      var hh = heightAt(Math.cos(ang)*r, Math.sin(ang)*r);
      if (!foundOut && hh >= -0.8) { rOut = r; foundOut = true; }
      if (hh >= 2.0) { rIn = r; break; }
    }

    var phase = fbm(Math.cos(ang)*2.3+5, Math.sin(ang)*2.3+5, 3) * 12.0;
    var amp = 0.7 + 0.6 * fbm(Math.cos(ang)*1.7+9, Math.sin(ang)*1.7+2, 3);

    for (var ir = 0; ir <= SEGR; ir++) {
      var f = ir / SEGR, rr = rOut + (rIn - rOut) * f;
      var sx = Math.cos(ang)*rr, sz = Math.sin(ang)*rr, sh = heightAt(sx, sz);
      pos.push(sx, sh + 0.06, sz);
      aH.push(sh); aPh.push(phase); aAm.push(amp);
    }
  }

  for (var ia2 = 0; ia2 < SEGA; ia2++) {
    for (var ir2 = 0; ir2 < SEGR; ir2++) {
      var a = ia2 * (SEGR+1) + ir2, b = (ia2+1) * (SEGR+1) + ir2;
      idx.push(a, b, a+1, b, b+1, a+1);
    }
  }

  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('aH', new THREE.Float32BufferAttribute(aH, 1));
  geo.setAttribute('aPh', new THREE.Float32BufferAttribute(aPh, 1));
  geo.setAttribute('aAm', new THREE.Float32BufferAttribute(aAm, 1));
  geo.setIndex(idx);

  var mat = new THREE.ShaderMaterial({
    uniforms: swashU, transparent: true, depthWrite: false,
    vertexShader: [
      'attribute float aH;attribute float aPh;attribute float aAm;',
      'varying float vH;varying float vPh;varying float vAm;varying vec3 vW;',
      'void main(){vH=aH;vPh=aPh;vAm=aAm;',
      '  vec4 wp=modelMatrix*vec4(position,1.0);vW=wp.xyz;',
      '  gl_Position=projectionMatrix*viewMatrix*wp;}'
    ].join('\n'),
    fragmentShader: [
      'uniform float time;',
      'varying float vH;varying float vPh;varying float vAm;varying vec3 vW;',
      'float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}',
      'float noise(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.-2.*f);',
      '  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);}',
      'float fbm(vec2 p){float t=0.,a=.5;for(int i=0;i<3;i++){t+=a*noise(p);p*=2.1;a*=.5;}return t;}',
      'void main(){',
      '  float ph=time*0.9+vPh;',
      '  float s=sin(ph);',
      '  float L=mix(-0.5,1.55*vAm,max(s,0.0));',
      '  float s2=sin(time*1.6+vPh*1.7+2.0);',
      '  float L2=mix(-0.5,0.95*vAm,max(s2,0.0));',
      '  if(L2>L){L=L2;s=s2;}',
      '  float film=smoothstep(L,L-0.35,vH);',
      '  float edge=(1.0-smoothstep(0.0,0.28,abs(vH-L)))*(0.55+0.45*fbm(vW.xz*1.8+time*0.7));',
      '  edge*=step(0.01,max(s,0.0));',
      '  float sLag=sin(ph-1.15);',
      '  float Llag=mix(-0.5,1.55*vAm,max(sLag,0.0));',
      '  float wet=smoothstep(max(L,Llag)+0.6,max(L,Llag)-0.6,vH)*(1.0-film);',
      '  wet*=clamp(0.5+0.5*sLag,0.0,1.0);',
      '  vec3 waterCol=mix(vec3(0.45,0.72,0.70),vec3(0.97,0.99,1.0),clamp(edge,0.,1.));',
      '  float filmA=film*(0.35+0.25*max(s,0.0))+edge*0.6;',
      '  vec3 col=mix(vec3(0.30,0.24,0.16),waterCol,clamp(filmA*2.5,0.,1.));',
      '  float alpha=clamp(filmA+wet*0.35,0.0,1.0);',
      '  alpha*=smoothstep(1.9,1.45,vH);',
      '  alpha*=mix(0.45,1.0,smoothstep(-0.9,-0.1,vH));',
      '  gl_FragColor=vec4(col,alpha);}'
    ].join('\n')
  });

  var swash = new THREE.Mesh(geo, mat);
  swash.renderOrder = 2;
  scene.add(swash);
})();

/* ============================================================
   CLOUDS — sprite-based, drifting
   ============================================================ */
function radialTex(inner, outer) {
  var cv = document.createElement('canvas'); cv.width = cv.height = 128;
  var g = cv.getContext('2d'), gr = g.createRadialGradient(64,64,4,64,64,64);
  gr.addColorStop(0, inner); gr.addColorStop(1, outer);
  g.fillStyle = gr; g.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(cv);
}

var cTex = radialTex('rgba(255,255,255,0.9)', 'rgba(255,255,255,0)');
var clouds = new THREE.Group();
for (var ci = 0; ci < 26; ci++) {
  var cm = new THREE.SpriteMaterial({ map: cTex, transparent: true,
    opacity: 0.5 + Math.random()*0.35, depthWrite: false, fog: false });
  var cs = new THREE.Sprite(cm);
  var csc = 40 + Math.random()*70;
  cs.scale.set(csc, csc*0.38, 1);
  cs.position.set(Math.random()*1000-500, 90+Math.random()*70, Math.random()*1000-500);
  cs.userData.speed = 0.03 + Math.random()*0.05;
  clouds.add(cs);
}
scene.add(clouds);

/* ============================================================
   AUDIO ENGINE — procedural, ready for future use
   ============================================================ */
var AudioEngine = {
  ctx: null, masterGain: null,
  init: function() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.3;
    this.masterGain.connect(this.ctx.destination);
  },
  impact: function(force) {
    if (!this.ctx) return;
    var o = this.ctx.createOscillator(), g = this.ctx.createGain(), f = this.ctx.createBiquadFilter();
    o.type = 'triangle'; o.frequency.value = 80+force*10;
    f.type = 'lowpass'; f.frequency.value = 300+force*50;
    g.gain.value = Math.min(0.4, force*0.05);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+0.2);
    o.connect(f).connect(g).connect(this.masterGain);
    o.start(); o.stop(this.ctx.currentTime+0.25);
  }
};
window.addEventListener('keydown', function(){ AudioEngine.init(); }, { once: true });
window.addEventListener('click', function(){ AudioEngine.init(); }, { once: true });

/* ============================================================
   CAMERA — orbit, drag to look, scroll to zoom
   ============================================================ */
var camTheta = 0.15, camPhi = 1.12, camRadius = 150;
var dragging = false, dragX = 0, dragY = 0, autoRotate = true;

function updateCamera() {
  camPhi = Math.max(0.3, Math.min(1.5, camPhi));
  camRadius = Math.max(45, Math.min(460, camRadius));
  camera.position.set(
    camRadius * Math.sin(camPhi) * Math.sin(camTheta),
    Math.max(camRadius * Math.cos(camPhi), 2.5),
    camRadius * Math.sin(camPhi) * Math.cos(camTheta));
  camera.lookAt(0, 4, 0);
}

addEventListener('pointerdown', function(e) { dragging = true; autoRotate = false; dragX = e.clientX; dragY = e.clientY; });
addEventListener('pointerup', function() { dragging = false; });
addEventListener('pointermove', function(e) {
  if (!dragging) return;
  camTheta -= (e.clientX - dragX) * 0.005;
  camPhi -= (e.clientY - dragY) * 0.005;
  dragX = e.clientX; dragY = e.clientY;
});
addEventListener('wheel', function(e) { camRadius += e.deltaY * 0.08; autoRotate = false; });

/* ============================================================
   HUD
   ============================================================ */
var hudEl = document.getElementById('hud');
var debugEl = document.getElementById('debug');

/* ============================================================
   GAME LOOP
   ============================================================ */
var clock = new THREE.Clock();
var lastT = 0;

function animate() {
  requestAnimationFrame(animate);
  var t = clock.getElapsedTime();
  var dt = Math.min(t - lastT, 0.05);
  lastT = t;

  // update uniforms
  waterU.time.value = t;
  waterU.camPos.value.copy(camera.position);
  swashU.time.value = t;
  sky.material.uniforms.uTime.value = t;

  // clouds drift
  clouds.children.forEach(function(c) {
    c.position.x += c.userData.speed;
    if (c.position.x > 560) c.position.x = -560;
  });

  // physics (for future entities)
  var subDt = dt / WORLD.SUBSTEPS;
  for (var s = 0; s < WORLD.SUBSTEPS; s++) {
    for (var i = 0; i < entities.length; i++) {
      if (entities[i].dynamic) Physics.step(entities[i], subDt);
    }
    for (var i2 = 0; i2 < entities.length; i2++) {
      for (var j = i2+1; j < entities.length; j++) {
        if (entities[i2].dynamic || entities[j].dynamic) Physics.collide(entities[i2], entities[j]);
      }
    }
  }
  for (var k = 0; k < entities.length; k++) {
    var e = entities[k];
    if (e.mesh) e.mesh.position.set(e.pos.x, e.pos.y, e.pos.z);
  }

  if (autoRotate) camTheta += 0.0009;
  updateCamera();

  // HUD
  hudEl.innerHTML =
    '<span class="l">Drag</span> look around  <span class="l">Scroll</span> zoom\n' +
    '<span class="l">Entities:</span> ' + entities.length + '  <span class="l">Land:</span> empty';

  debugEl.innerHTML =
    '┌─ WORLD RULES ───────────┐\n' +
    '│ Gravity:  ' + WORLD.GRAVITY.toFixed(2) + ' m/s²       │\n' +
    '│ Air ρ:    ' + WORLD.AIR_DENSITY.toFixed(3) + ' kg/m³    │\n' +
    '│ Friction: ' + WORLD.GROUND_FRICTION.toFixed(2) + '            │\n' +
    '│ Bounce:   ' + WORLD.GROUND_BOUNCE.toFixed(2) + '            │\n' +
    '│ Wind:     ' + WORLD.WIND.x.toFixed(1) + ',' + WORLD.WIND.z.toFixed(1) + ' m/s      │\n' +
    '│ Island:   ' + IR + 'm radius      │\n' +
    '│ Entities: ' + entities.length + '               │\n' +
    '└─────────────────────────┘';

  renderer.render(scene, camera);
}

animate();

addEventListener('resize', function() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>
