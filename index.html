<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Doxibero World</title>

<!-- ============================================================
     LANGUAGE: CSS3
     Purpose: Glassmorphic HUD, animations
     ============================================================ -->
<style>
  html, body { margin: 0; overflow: hidden; background: #000; }

  #hud {
    position: fixed; bottom: 14px; left: 14px;
    color: #e0e8f0; font-family: 'Courier New', monospace; font-size: 12px;
    background: linear-gradient(135deg, rgba(15,25,50,.55), rgba(10,15,35,.45));
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(120,160,255,.15);
    padding: 10px 16px; border-radius: 10px;
    pointer-events: none; line-height: 1.6; white-space: pre;
    box-shadow: 0 4px 30px rgba(0,0,0,.35), inset 0 0 20px rgba(80,120,255,.04);
  }
  #hud .label { color: #6a8ccc; }
  #hud .value { color: #e8f0ff; font-weight: bold; }

  #debug {
    position: fixed; top: 14px; right: 14px;
    color: #8aa0c0; font-family: 'Courier New', monospace; font-size: 11px;
    background: linear-gradient(135deg, rgba(10,15,30,.5), rgba(5,10,25,.4));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(100,140,220,.12);
    padding: 8px 14px; border-radius: 8px;
    pointer-events: none; line-height: 1.5; white-space: pre;
    box-shadow: 0 2px 20px rgba(0,0,0,.3);
  }
</style>
</head>
<body>

<div id="hud"></div>
<div id="debug"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>

/* ============================================================
   SECTION: WORLD CONSTANTS
   ============================================================ */
var WORLD = {
  GRAVITY:         9.81,
  AIR_DENSITY:     1.225,
  DRAG_COEFF:      0.47,
  WIND:            { x: 0.5, y: 0, z: 0.3 },

  GROUND_Y:        0,
  GROUND_FRICTION: 0.6,
  GROUND_BOUNCE:   0.3,

  SIZE:            400,
  BOUNDARY:        'soft',

  MAX_DT:          0.05,
  SUBSTEPS:        2,

  RESTITUTION:     0.4,
  MIN_VELOCITY:    0.01,

  // Island
  ISLAND_RADIUS:   150,
  ISLAND_HEIGHT:   4,

  // Sea
  SEA_LEVEL:       -0.5,

  // Sky
  SUN_AZIMUTH:     0.8,
  SUN_ELEVATION:   0.45,
  TIME_OF_DAY:     0.65
};

/* ============================================================
   SECTION: VECTOR MATH
   ============================================================ */
var VMath = {
  dist: function(a, b) { var dx=b.x-a.x,dy=b.y-a.y,dz=b.z-a.z; return Math.sqrt(dx*dx+dy*dy+dz*dz); },
  distXZ: function(a, b) { var dx=b.x-a.x,dz=b.z-a.z; return Math.sqrt(dx*dx+dz*dz); },
  len: function(v) { return Math.sqrt(v.x*v.x+v.y*v.y+v.z*v.z); },
  lenXZ: function(v) { return Math.sqrt(v.x*v.x+v.z*v.z); },
  normalize: function(v) { var l=VMath.len(v); if(l<0.0001)return{x:0,y:0,z:0}; return{x:v.x/l,y:v.y/l,z:v.z/l}; },
  dot: function(a, b) { return a.x*b.x+a.y*b.y+a.z*b.z; },
  cross: function(a, b) { return{x:a.y*b.z-a.z*b.y,y:a.z*b.x-a.x*b.z,z:a.x*b.y-a.y*b.x}; },
  scale: function(v, s) { return{x:v.x*s,y:v.y*s,z:v.z*s}; },
  add: function(a, b) { return{x:a.x+b.x,y:a.y+b.y,z:a.z+b.z}; },
  sub: function(a, b) { return{x:a.x-b.x,y:a.y-b.y,z:a.z-b.z}; },
  clamp: function(v, mn, mx) { return Math.max(mn,Math.min(mx,v)); },
  lerp: function(a, b, t) { return a+(b-a)*t; },
  wrapAngle: function(a) { while(a>Math.PI)a-=2*Math.PI; while(a<-Math.PI)a+=2*Math.PI; return a; },
  reflect: function(v, n) { var d=VMath.dot(v,n)*2; return{x:v.x-d*n.x,y:v.y-d*n.y,z:v.z-d*n.z}; },
  rotateY: function(v, a) { var c=Math.cos(a),s=Math.sin(a); return{x:v.x*c-v.z*s,y:v.y,z:v.x*s+v.z*c}; }
};

/* ============================================================
   SECTION: PHYSICS ENGINE
   ============================================================ */
var Physics = {
  step: function(entity, dt) {
    var halfSize = WORLD.SIZE / 2;
    entity.vel.y -= WORLD.GRAVITY * dt;
    var speed = VMath.len(entity.vel);
    if (speed > WORLD.MIN_VELOCITY) {
      var area = Math.PI * entity.radius * entity.radius;
      var dragForce = 0.5 * WORLD.AIR_DENSITY * speed * speed * entity.dragCoeff * area;
      var dragDt = Math.min((dragForce / entity.mass) * dt, speed);
      var dragDir = VMath.normalize(entity.vel);
      entity.vel.x -= dragDir.x * dragDt;
      entity.vel.y -= dragDir.y * dragDt;
      entity.vel.z -= dragDir.z * dragDt;
    }
    if (WORLD.WIND.x || WORLD.WIND.z) {
      var wf = 0.5 * WORLD.AIR_DENSITY * Math.PI * entity.radius * entity.radius * 0.3;
      entity.vel.x += (WORLD.WIND.x * wf / entity.mass) * dt;
      entity.vel.z += (WORLD.WIND.z * wf / entity.mass) * dt;
    }
    entity.pos.x += entity.vel.x * dt;
    entity.pos.y += entity.vel.y * dt;
    entity.pos.z += entity.vel.z * dt;
    entity.grounded = false;
    if (entity.pos.y <= WORLD.GROUND_Y + entity.radius) {
      entity.pos.y = WORLD.GROUND_Y + entity.radius;
      if (entity.vel.y < -0.5) entity.vel.y *= -entity.bounce; else entity.vel.y = 0;
      var fric = VMath.clamp(1 - entity.friction * dt * 10, 0, 1);
      entity.vel.x *= fric; entity.vel.z *= fric;
      entity.grounded = true;
    }
    if (WORLD.BOUNDARY === 'soft') {
      var push = 20;
      if (entity.pos.x < -halfSize + 2) entity.vel.x += push * dt;
      if (entity.pos.x >  halfSize - 2) entity.vel.x -= push * dt;
      if (entity.pos.z < -halfSize + 2) entity.vel.z += push * dt;
      if (entity.pos.z >  halfSize - 2) entity.vel.z -= push * dt;
    }
    if (Math.abs(entity.vel.x) < WORLD.MIN_VELOCITY) entity.vel.x = 0;
    if (Math.abs(entity.vel.y) < WORLD.MIN_VELOCITY) entity.vel.y = 0;
    if (Math.abs(entity.vel.z) < WORLD.MIN_VELOCITY) entity.vel.z = 0;
  },
  collide: function(a, b) {
    var diff = VMath.sub(b.pos, a.pos);
    var dist = VMath.len(diff);
    var minDist = a.radius + b.radius;
    if (dist < minDist && dist > 0.001) {
      var normal = VMath.scale(diff, 1 / dist);
      var overlap = minDist - dist;
      var totalMass = a.mass + b.mass;
      a.pos.x -= normal.x * overlap * (b.mass / totalMass);
      a.pos.y -= normal.y * overlap * (b.mass / totalMass);
      a.pos.z -= normal.z * overlap * (b.mass / totalMass);
      b.pos.x += normal.x * overlap * (a.mass / totalMass);
      b.pos.y += normal.y * overlap * (a.mass / totalMass);
      b.pos.z += normal.z * overlap * (a.mass / totalMass);
      var relVel = VMath.sub(a.vel, b.vel);
      var vn = VMath.dot(relVel, normal);
      if (vn > 0) return false;
      var impulse = -(1 + Math.min(a.bounce, b.bounce)) * vn / totalMass;
      a.vel.x += impulse * b.mass * normal.x; a.vel.y += impulse * b.mass * normal.y; a.vel.z += impulse * b.mass * normal.z;
      b.vel.x -= impulse * a.mass * normal.x; b.vel.y -= impulse * a.mass * normal.y; b.vel.z -= impulse * a.mass * normal.z;
      return true;
    }
    return false;
  }
};

/* ============================================================
   SECTION: ENTITY REGISTRY
   ============================================================ */
var entities = [];

function createEntity(options) {
  var e = {
    pos: options.pos || {x:0,y:5,z:0}, vel: options.vel || {x:0,y:0,z:0},
    mass: options.mass || 1, radius: options.radius || 0.5,
    friction: options.friction || WORLD.GROUND_FRICTION, bounce: options.bounce || WORLD.GROUND_BOUNCE,
    dragCoeff: options.dragCoeff || WORLD.DRAG_COEFF, grounded: false, heading: options.heading || 0,
    type: options.type || 'generic', mesh: options.mesh || null,
    dynamic: options.dynamic !== undefined ? options.dynamic : true, data: options.data || {}
  };
  entities.push(e);
  return e;
}

/* ============================================================
   SECTION: RENDERER
   ============================================================ */
var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

/* ============================================================
   SECTION: SCENE
   ============================================================ */
var scene = new THREE.Scene();

/* ============================================================
   LANGUAGE: GLSL
   SECTION: SKY SHADER
   ============================================================ */
var skyVS = [
  'varying vec3 vWorldPos;',
  'void main() {',
  '  vec4 wp = modelMatrix * vec4(position, 1.0);',
  '  vWorldPos = wp.xyz;',
  '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
  '}'
].join('\n');

var skyFS = [
  'uniform vec3 uSunDir;',
  'uniform float uTime;',
  'varying vec3 vWorldPos;',

  'float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453); }',

  'float noise(vec2 p) {',
  '  vec2 i = floor(p), f = fract(p);',
  '  f = f*f*(3.0-2.0*f);',
  '  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x), mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x), f.y);',
  '}',

  'float fbm(vec2 p) {',
  '  float v=0.0,a=0.5; mat2 r=mat2(0.8,0.6,-0.6,0.8);',
  '  for(int i=0;i<5;i++){v+=a*noise(p);p=r*p*2.0;a*=0.5;}return v;',
  '}',

  'void main() {',
  '  vec3 dir = normalize(vWorldPos - cameraPosition);',
  '  float y = dir.y;',
  '  float sunDot = max(dot(dir, uSunDir), 0.0);',
  '  float sunH = uSunDir.y;',

  '  vec3 zenith = vec3(0.15,0.35,0.85);',
  '  vec3 horizon = vec3(0.55,0.65,0.8);',
  '  vec3 sunset = vec3(1.0,0.45,0.15);',
  '  horizon = mix(sunset, horizon, smoothstep(0.0,0.35,sunH));',
  '  float t = smoothstep(-0.05,0.5,y);',
  '  vec3 sky = mix(horizon, zenith, t);',

  '  vec3 nightSky = mix(vec3(0.04,0.05,0.12), vec3(0.02,0.03,0.08), t);',
  '  float nightF = 1.0 - smoothstep(-0.1,0.15,sunH);',
  '  sky = mix(sky, nightSky, nightF);',

  '  sky += mix(vec3(1,.5,.2),vec3(1,.95,.8),smoothstep(.1,.5,sunH)) * (pow(sunDot,256.0) + pow(sunDot,8.0)*0.35);',

  '  if(nightF>0.1){',
  '    float stars = step(0.997,hash(floor(dir.xz*300.0+dir.y*300.0)));',
  '    sky += vec3(stars*nightF*(0.7+0.3*sin(uTime*3.0+hash(floor(dir.xz*300.0))*50.0)));',
  '  }',

  '  if(y>0.0){',
  '    vec2 cuv = dir.xz/(y+0.1)*3.0+uTime*0.02;',
  '    float cloud = smoothstep(0.35,0.65,fbm(cuv));',
  '    float cb = mix(0.15,1.0,smoothstep(-0.05,0.3,sunH));',
  '    sky = mix(sky,vec3(cb)*mix(vec3(1,.7,.5),vec3(1),smoothstep(.1,.4,sunH)),cloud*0.55*smoothstep(0.0,0.15,y));',
  '  }',

  '  sky = mix(sky, mix(sunset*0.5,vec3(.7,.75,.8),smoothstep(.1,.5,sunH)), exp(-abs(y)*8.0)*0.25);',
  '  gl_FragColor = vec4(sky, 1.0);',
  '}'
].join('\n');

function getSunDir() {
  var elev = WORLD.SUN_ELEVATION * Math.PI / 2;
  return new THREE.Vector3(Math.cos(elev)*Math.sin(WORLD.SUN_AZIMUTH), Math.sin(elev), Math.cos(elev)*Math.cos(WORLD.SUN_AZIMUTH)).normalize();
}

var skyUniforms = { uSunDir: { value: getSunDir() }, uTime: { value: 0 } };
var skyDome = new THREE.Mesh(
  new THREE.SphereGeometry(500, 32, 24),
  new THREE.ShaderMaterial({ vertexShader: skyVS, fragmentShader: skyFS, uniforms: skyUniforms, side: THREE.BackSide, depthWrite: false })
);
scene.add(skyDome);

/* ============================================================
   SECTION: CAMERA
   ============================================================ */
var camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, 0.1, 700);
camera.position.set(0, 60, 180);
camera.lookAt(0, 0, 0);

window.addEventListener('resize', function() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ============================================================
   SECTION: LIGHTING
   ============================================================ */
var hemiLight = new THREE.HemisphereLight(0xbfd9ff, 0x3f5a36, 0.7);
scene.add(hemiLight);

var sunDir = getSunDir();
var sunLight = new THREE.DirectionalLight(0xfff2d9, 1.6);
sunLight.position.set(sunDir.x * 100, sunDir.y * 100, sunDir.z * 100);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = -150;
sunLight.shadow.camera.right = 150;
sunLight.shadow.camera.top = 150;
sunLight.shadow.camera.bottom = -150;
sunLight.shadow.camera.far = 500;
sunLight.shadow.bias = -0.0004;
scene.add(sunLight);
scene.add(sunLight.target);

/* ============================================================
   LANGUAGE: JAVASCRIPT + CANVAS 2D
   SECTION: ISLAND TERRAIN
   Procedural island using height-mapped circular geometry.
   Height generated via Canvas 2D noise, shaped into island.
   ============================================================ */
var ISLAND_RES = 128;
var ISLAND_R = WORLD.ISLAND_RADIUS;
var ISLAND_H = WORLD.ISLAND_HEIGHT;

// Generate height data using layered noise (Canvas 2D for computation)
var heightData = [];
(function generateIslandHeights() {
  // Simple seeded noise via canvas
  var nc = document.createElement('canvas');
  nc.width = nc.height = ISLAND_RES + 1;
  var nctx = nc.getContext('2d');

  // Layered noise function
  function simpleNoise(x, z) {
    var v = 0;
    v += Math.sin(x * 0.02 + 1.3) * Math.cos(z * 0.03 + 0.7) * 1.0;
    v += Math.sin(x * 0.05 + 2.1) * Math.cos(z * 0.04 - 1.2) * 0.5;
    v += Math.sin(x * 0.11 + 0.5) * Math.cos(z * 0.09 + 3.1) * 0.25;
    v += Math.sin(x * 0.23 - 1.7) * Math.cos(z * 0.19 + 0.3) * 0.12;
    return v;
  }

  for (var iz = 0; iz <= ISLAND_RES; iz++) {
    heightData[iz] = [];
    for (var ix = 0; ix <= ISLAND_RES; ix++) {
      // Map grid to world coordinates
      var wx = (ix / ISLAND_RES - 0.5) * ISLAND_R * 2;
      var wz = (iz / ISLAND_RES - 0.5) * ISLAND_R * 2;

      // Distance from center (0 at center, 1 at edge)
      var dist = Math.sqrt(wx * wx + wz * wz) / ISLAND_R;

      // Island falloff — smooth drop to sea level at edges
      var falloff = 1.0 - smoothstepJS(0.55, 1.0, dist);
      falloff *= falloff; // sharper edge

      // Noise-based terrain variation
      var n = simpleNoise(wx, wz);

      // Final height
      var h = (n * 0.5 + 0.5) * ISLAND_H * falloff;

      // Below sea level outside island
      if (dist > 0.95) h = Math.min(h, WORLD.SEA_LEVEL - 1);

      heightData[iz][ix] = h;
    }
  }
})();

function smoothstepJS(edge0, edge1, x) {
  var t = VMath.clamp((x - edge0) / (edge1 - edge0), 0, 1);
  return t * t * (3 - 2 * t);
}

// Build terrain mesh from height data
var terrainGeo = new THREE.PlaneGeometry(ISLAND_R * 2, ISLAND_R * 2, ISLAND_RES, ISLAND_RES);
terrainGeo.rotateX(-Math.PI / 2);
var terrainVerts = terrainGeo.attributes.position;

for (var i = 0; i <= ISLAND_RES; i++) {
  for (var j = 0; j <= ISLAND_RES; j++) {
    var idx = i * (ISLAND_RES + 1) + j;
    terrainVerts.setY(idx, heightData[i][j]);
  }
}
terrainGeo.computeVertexNormals();

/* ============================================================
   LANGUAGE: GLSL
   SECTION: ISLAND GROUND SHADER
   GPU-rendered terrain coloring based on height and slope.
   ============================================================ */
var terrainVS = [
  'varying vec3 vWorldPos;',
  'varying vec3 vNormal;',
  'varying float vHeight;',
  'void main() {',
  '  vec4 wp = modelMatrix * vec4(position, 1.0);',
  '  vWorldPos = wp.xyz;',
  '  vNormal = normalize(normalMatrix * normal);',
  '  vHeight = position.y;',
  '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);',
  '}'
].join('\n');

var terrainFS = [
  'uniform vec3 uSunDir;',
  'varying vec3 vWorldPos;',
  'varying vec3 vNormal;',
  'varying float vHeight;',

  'float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}',

  'void main() {',
  '  float slope = 1.0 - vNormal.y;', // 0 = flat, 1 = vertical

  '  // Color by height + slope',
  '  vec3 sand   = vec3(0.76, 0.70, 0.50);',
  '  vec3 grass  = vec3(0.30, 0.52, 0.22);',
  '  vec3 dirt   = vec3(0.45, 0.35, 0.25);',
  '  vec3 rock   = vec3(0.42, 0.40, 0.38);',

  '  // Beach near sea level',
  '  float beachFactor = 1.0 - smoothstep(0.0, 1.5, vHeight);',

  '  // Grass on flat areas, rock on slopes',
  '  vec3 groundColor = mix(grass, rock, smoothstep(0.3, 0.7, slope));',

  '  // Blend sand at low altitude',
  '  groundColor = mix(groundColor, sand, beachFactor);',

  '  // Subtle noise variation',
  '  float n = hash(floor(vWorldPos.xz * 2.0));',
  '  groundColor += (n - 0.5) * 0.04;',

  '  // Simple diffuse lighting',
  '  float diffuse = max(dot(vNormal, uSunDir), 0.0);',
  '  float ambient = 0.35;',
  '  vec3 lit = groundColor * (ambient + diffuse * 0.65);',

  '  // Distance fog',
  '  float dist = length(vWorldPos.xz);',
  '  float fog = smoothstep(100.0, 250.0, dist);',
  '  lit = mix(lit, vec3(0.55, 0.68, 0.78), fog);',

  '  gl_FragColor = vec4(lit, 1.0);',
  '}'
].join('\n');

var terrainUniforms = { uSunDir: { value: getSunDir() } };
var terrainMaterial = new THREE.ShaderMaterial({
  vertexShader: terrainVS,
  fragmentShader: terrainFS,
  uniforms: terrainUniforms
});

var terrainMesh = new THREE.Mesh(terrainGeo, terrainMaterial);
terrainMesh.receiveShadow = true;
scene.add(terrainMesh);

/* ============================================================
   LANGUAGE: GLSL
   SECTION: OCEAN SHADER
   GPU-rendered infinite ocean with animated waves, reflections,
   foam at shoreline, and depth-based color.
   ============================================================ */
var oceanVS = [
  'uniform float uTime;',
  'varying vec3 vWorldPos;',
  'varying vec2 vUv;',

  'void main() {',
  '  vec3 pos = position;',

  '  // Vertex wave displacement (Gerstner-like)',
  '  float w1 = sin(pos.x * 0.08 + uTime * 1.2) * cos(pos.z * 0.06 + uTime * 0.9) * 0.6;',
  '  float w2 = sin(pos.x * 0.15 + pos.z * 0.1 + uTime * 1.8) * 0.3;',
  '  float w3 = sin(pos.x * 0.03 - uTime * 0.5) * cos(pos.z * 0.04 + uTime * 0.7) * 1.0;',
  '  pos.y += w1 + w2 + w3;',

  '  vec4 wp = modelMatrix * vec4(pos, 1.0);',
  '  vWorldPos = wp.xyz;',
  '  vUv = uv;',
  '  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);',
  '}'
].join('\n');

var oceanFS = [
  'uniform float uTime;',
  'uniform vec3 uSunDir;',
  'uniform float uIslandRadius;',
  'varying vec3 vWorldPos;',
  'varying vec2 vUv;',

  'float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}',
  'float noise(vec2 p){',
  '  vec2 i=floor(p),f=fract(p);f=f*f*(3.0-2.0*f);',
  '  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);',
  '}',

  'void main() {',
  '  vec3 dir = normalize(vWorldPos - cameraPosition);',

  '  // Deep vs shallow color',
  '  float distFromCenter = length(vWorldPos.xz);',
  '  float shallowFactor = smoothstep(uIslandRadius * 0.6, uIslandRadius * 1.0, distFromCenter);',
  '  vec3 deepColor = vec3(0.02, 0.10, 0.25);',
  '  vec3 shallowColor = vec3(0.05, 0.30, 0.35);',
  '  vec3 waterColor = mix(shallowColor, deepColor, shallowFactor);',

  '  // Wave-based normal perturbation for specular',
  '  float wave = sin(vWorldPos.x*0.3+uTime*1.5)*0.5 + cos(vWorldPos.z*0.4+uTime*1.1)*0.5;',
  '  wave += noise(vWorldPos.xz * 0.15 + uTime * 0.3) * 0.4;',
  '  vec3 normal = normalize(vec3(cos(vWorldPos.x*0.3+uTime*1.5)*0.15, 1.0, -sin(vWorldPos.z*0.4+uTime*1.1)*0.15));',

  '  // Specular sun reflection',
  '  vec3 reflDir = reflect(dir, normal);',
  '  float spec = pow(max(dot(reflDir, uSunDir), 0.0), 256.0);',
  '  float specGlow = pow(max(dot(reflDir, uSunDir), 0.0), 16.0) * 0.15;',
  '  vec3 sunSpec = vec3(1.0, 0.95, 0.8) * (spec + specGlow);',

  '  // Fresnel — more reflective at glancing angles',
  '  float fresnel = pow(1.0 - max(dot(-dir, normal), 0.0), 3.0);',
  '  fresnel = 0.1 + 0.9 * fresnel;',

  '  // Sky reflection color (simplified)',
  '  vec3 skyRefl = mix(vec3(0.55,0.65,0.8), vec3(0.15,0.35,0.85), max(reflDir.y, 0.0));',

  '  // Combine',
  '  vec3 color = mix(waterColor, skyRefl, fresnel * 0.5) + sunSpec;',

  '  // Foam near shore',
  '  float shoreDist = abs(distFromCenter - uIslandRadius * 0.92);',
  '  float foam = smoothstep(15.0, 0.0, shoreDist);',
  '  foam *= (0.5 + 0.5 * sin(vWorldPos.x * 0.8 + uTime * 2.5)) * (0.5 + 0.5 * cos(vWorldPos.z * 0.7 + uTime * 2.0));',
  '  color = mix(color, vec3(0.85, 0.92, 0.95), foam * 0.6);',

  '  // Distance fog',
  '  float fog = smoothstep(150.0, 400.0, length(vWorldPos.xz));',
  '  color = mix(color, vec3(0.55, 0.68, 0.78), fog);',

  '  gl_FragColor = vec4(color, 0.92);',
  '}'
].join('\n');

var oceanUniforms = {
  uTime: { value: 0 },
  uSunDir: { value: getSunDir() },
  uIslandRadius: { value: ISLAND_R }
};

var oceanGeo = new THREE.PlaneGeometry(800, 800, 200, 200);
var oceanMaterial = new THREE.ShaderMaterial({
  vertexShader: oceanVS,
  fragmentShader: oceanFS,
  uniforms: oceanUniforms,
  transparent: true,
  side: THREE.DoubleSide
});

var oceanMesh = new THREE.Mesh(oceanGeo, oceanMaterial);
oceanMesh.rotation.x = -Math.PI / 2;
oceanMesh.position.y = WORLD.SEA_LEVEL;
scene.add(oceanMesh);

/* ============================================================
   SECTION: FREE CAMERA CONTROLS
   No objects — just fly around and look at the world.
   ============================================================ */
var camState = {
  x: 0, y: 40, z: 160,
  heading: 0,
  pitch: -0.15,
  speed: 40
};

var keys = {};
window.addEventListener('keydown', function(e) {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') e.preventDefault();
});
window.addEventListener('keyup', function(e) {
  keys[e.key.toLowerCase()] = false;
});

// Mouse look
var mouseDown = false;
var mouseX = 0, mouseY = 0;
renderer.domElement.addEventListener('mousedown', function(e) { mouseDown = true; mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mouseup', function() { mouseDown = false; });
window.addEventListener('mousemove', function(e) {
  if (!mouseDown) return;
  var dx = e.clientX - mouseX;
  var dy = e.clientY - mouseY;
  mouseX = e.clientX;
  mouseY = e.clientY;
  camState.heading -= dx * 0.003;
  camState.pitch = VMath.clamp(camState.pitch - dy * 0.003, -1.4, 1.4);
});

/* ============================================================
   LANGUAGE: JAVASCRIPT + WEB AUDIO API
   SECTION: AUDIO ENGINE
   ============================================================ */
var AudioEngine = {
  ctx: null, masterGain: null,
  init: function() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.3;
    this.masterGain.connect(this.ctx.destination);
  },
  impact: function(force) {
    if (!this.ctx) return;
    var o = this.ctx.createOscillator(), g = this.ctx.createGain(), f = this.ctx.createBiquadFilter();
    o.type = 'triangle'; o.frequency.value = 80 + force * 10;
    f.type = 'lowpass'; f.frequency.value = 300 + force * 50;
    g.gain.value = Math.min(0.4, force * 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.2);
    o.connect(f).connect(g).connect(this.masterGain);
    o.start(); o.stop(this.ctx.currentTime + 0.25);
  }
};
window.addEventListener('keydown', function() { AudioEngine.init(); }, { once: true });

/* ============================================================
   SECTION: UPDATE
   ============================================================ */
function update(dt, time) {
  // --- Free Camera Movement ---
  var spd = camState.speed * (keys['shift'] ? 3 : 1);
  var fwd = 0, strafe = 0, up = 0;
  if (keys['w'] || keys['arrowup'])    fwd = 1;
  if (keys['s'] || keys['arrowdown'])  fwd = -1;
  if (keys['a'] || keys['arrowleft'])  strafe = 1;
  if (keys['d'] || keys['arrowright']) strafe = -1;
  if (keys[' ']) up = 1;
  if (keys['c']) up = -1;

  var ch = Math.cos(camState.heading), sh = Math.sin(camState.heading);
  var cp = Math.cos(camState.pitch);

  camState.x += (-sh * fwd * cp + ch * strafe) * spd * dt;
  camState.z += (-ch * fwd * cp - sh * strafe) * spd * dt;
  camState.y += (fwd * Math.sin(camState.pitch) + up) * spd * dt;
  camState.y = Math.max(2, camState.y);

  camera.position.set(camState.x, camState.y, camState.z);
  var lookX = camState.x - sh * cp;
  var lookY = camState.y + Math.sin(camState.pitch);
  var lookZ = camState.z - ch * cp;
  camera.lookAt(lookX, lookY, lookZ);

  // --- Sync sky dome ---
  skyDome.position.copy(camera.position);
  skyUniforms.uTime.value = time;
  oceanUniforms.uTime.value = time;

  // --- Sun follows camera ---
  sunLight.position.set(camState.x + sunDir.x * 100, sunDir.y * 100, camState.z + sunDir.z * 100);
  sunLight.target.position.set(camState.x, 0, camState.z);

  // --- Physics (for future entities) ---
  var subDt = dt / WORLD.SUBSTEPS;
  for (var s = 0; s < WORLD.SUBSTEPS; s++) {
    for (var i = 0; i < entities.length; i++) {
      if (entities[i].dynamic) Physics.step(entities[i], subDt);
    }
  }
  for (var i = 0; i < entities.length; i++) {
    var e = entities[i];
    if (e.mesh) e.mesh.position.set(e.pos.x, e.pos.y, e.pos.z);
  }
}

/* ============================================================
   SECTION: HUD
   ============================================================ */
var hudEl = document.getElementById('hud');
var debugEl = document.getElementById('debug');
var hudTimer = 0;

function updateHUD(dt) {
  hudTimer += dt;
  if (hudTimer < 0.2) return;
  hudTimer = 0;

  hudEl.innerHTML =
    '<span class="label">W/S</span> fly forward/back  ' +
    '<span class="label">A/D</span> strafe  ' +
    '<span class="label">Space/C</span> up/down  ' +
    '<span class="label">Shift</span> fast\n' +
    '<span class="label">Mouse drag</span> look around';

  debugEl.innerHTML =
    '┌─ WORLD RULES ───────────┐\n' +
    '│ Gravity:  ' + WORLD.GRAVITY.toFixed(2) + ' m/s²       │\n' +
    '│ Air ρ:    ' + WORLD.AIR_DENSITY.toFixed(3) + ' kg/m³    │\n' +
    '│ Friction: ' + WORLD.GROUND_FRICTION.toFixed(2) + '            │\n' +
    '│ Bounce:   ' + WORLD.GROUND_BOUNCE.toFixed(2) + '            │\n' +
    '│ Wind:     ' + WORLD.WIND.x.toFixed(1) + ',' + WORLD.WIND.z.toFixed(1) + ' m/s      │\n' +
    '│ Sea:      ' + WORLD.SEA_LEVEL.toFixed(1) + ' m           │\n' +
    '│ Island:   ' + WORLD.ISLAND_RADIUS + 'm radius     │\n' +
    '│ Entities: ' + entities.length + '               │\n' +
    '└─────────────────────────┘';
}

/* ============================================================
   SECTION: GAME LOOP
   ============================================================ */
var lastTime = performance.now();

function gameLoop(now) {
  var dt = Math.min(WORLD.MAX_DT, (now - lastTime) / 1000);
  lastTime = now;

  update(dt, now / 1000);
  updateHUD(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

</script>
</body>
</html>
